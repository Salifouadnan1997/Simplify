<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #ccc; padding: 20px; }
  .editor-wrapper {
    overflow-x: auto;
    width: 100%;
    padding: 20px;
  }
  .pages-container {
    height: 842px; /* A4 height approx at 72dpi, let's say 297mm */
    column-width: 595px; /* A4 width */
    column-gap: 20px;
    column-fill: auto;
  }
  .page-box {
    background: white;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    height: 100%;
    outline: none;
    padding: 40px;
    box-sizing: border-box;
  }
</style>
</head>
<body>
  <div class="editor-wrapper">
    <div class="pages-container page-box" contenteditable="true">
      <p>Type a lot of text here to see it flow to the next column!</p>
    </div>
  </div>
</body>
</html>
